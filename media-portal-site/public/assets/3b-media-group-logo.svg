<svg width="256" height="256" viewBox="0 0 256 256" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">3B Media Group Logo</title>
  <desc id="desc">Stylized 3B initials in a circular frame.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6e49b0"/>
      <stop offset="100%" stop-color="#351a6b"/>
    </linearGradient>
    <linearGradient id="mint" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6df0cb"/>
      <stop offset="100%" stop-color="#31c8df"/>
    </linearGradient>
  </defs>
  <rect width="256" height="256" rx="128" fill="url(#bg)"/>
  <circle cx="128" cy="128" r="108" fill="none" stroke="#cfd4e6" stroke-width="10"/>
  <text x="72" y="152" font-size="92" font-family="Arial, sans-serif" fill="#edf1ff" font-weight="700">3</text>
  <text x="122" y="152" font-size="92" font-family="Arial, sans-serif" fill="url(#mint)" font-weight="700">B</text>
  <text x="57" y="188" font-size="23" font-family="Arial, sans-serif" fill="#5be5c2" letter-spacing="1.5">MEDIA GROUP</text>
</svg>
